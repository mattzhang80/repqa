# RepQA Configuration
# Exercises: WALL_SLIDE, BAND_ER_SIDE

video:
  fps: 30
  width: 720

pose:
  confidence_threshold: 0.5
  low_confidence_frame_pct: 0.3  # flag session if >30% of frames have low confidence on key joints
  model_path: "data/models/pose_landmarker_full.task"
  model_download_url: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task"

# Exercise registry — the ONLY supported exercises
exercises:
  wall_slide:
    display_name: "Wall Slide (Forearms on Wall)"
    equipment: "Wall (optional towel)"
    filming_angle: "side"         # SIDE VIEW only
    camera_height: "shoulder"
    suggested_reps: [8, 12]       # 2–3 sets x 8–12 reps
    suggested_sets: [2, 3]
    tempo_spec: "2s up – 1s hold – 2s down"
    labels:
      - good
      - bad_tempo
      - bad_rom_partial
  band_er_side:
    display_name: "Band External Rotation at Side (Elbow Tucked)"
    equipment: "Light resistance band + anchor; rolled towel"
    filming_angle: "front"        # FRONT VIEW only
    camera_height: "chest"
    suggested_reps: [12, 20]      # 2–4 sets x 12–20 reps
    suggested_sets: [2, 4]
    tempo_spec: "2s out – 1s hold – 2s back"
    labels:
      - good
      - bad_tempo
      - bad_rom_partial

segmentation:
  wall_slide:
    signal: "wrist_y"             # vertical wrist travel from side view
    smoothing_window: 7
    smoothing_polyorder: 2
    min_peak_distance_s: 1.0      # lowered from 3.0 to catch bad_tempo reps (~1.5–2s)
    rep_duration_bounds_s: [1.0, 8.0]   # lowered floor from 3.0 to capture fast bad_tempo reps
    prominence: 0.05
  band_er_side:
    signal: "wrist_x_relative"    # lateral wrist displacement from front view
    smoothing_window: 7
    smoothing_polyorder: 2
    min_peak_distance_s: 1.3      # band ER reps run faster than wall slide (2–3s for bad_tempo);
                                  # 2.0 was merging adjacent rushed reps, 1.3 recovers them
    rep_duration_bounds_s: [1.5, 10.0]  # good reps 4–7s, bad_tempo 2–3s
    prominence: 0.05
    # Ghost-rep filter: use p75 of candidate amplitudes as the reference
    # (instead of the default median) so ghost reps dominating a session
    # — e.g. partial retractions between real reps in a fast-cadence session —
    # don't drag the median down to where they squeak through the filter.
    amplitude_reference_percentile: 75
    min_amplitude_ratio: 0.75

features:
  rom_proxy:
    wall_slide: "wrist_vertical_travel"
    band_er_side: "wrist_lateral_displacement"
  key_joints:
    - left_shoulder
    - right_shoulder
    - left_elbow
    - right_elbow
    - left_wrist
    - right_wrist
    - left_hip
    - right_hip

baseline:
  rom_cutoffs:
    wall_slide: 0.6              # normalized units; calibrated from observed good reps (0.64+)
    band_er_side: 0.2
  tempo_bounds_s:
    wall_slide: [3.0, 8.0]      # matches rep duration bounds
    band_er_side: [3.5, 10.0]   # calibrated: good reps 3.6–7.5s, bad_tempo <3.5s
  flag_unknown_on_low_confidence: true

personalization:
  baseline_sessions_n: 5

model:
  C_values: [0.01, 0.1, 1.0, 10.0]
  precision_target: 0.8
  cv_folds: 5
  random_state: 42

clip:
  padding_s: 0.3
  thumbnail_frame: "mid"         # options: mid, max_rom, start

report:
  template: "src/pipeline/templates/session_report.html"
  pdf_export: false
  safety_note: "Stop if pain >3/10 or if you feel instability/apprehension."
